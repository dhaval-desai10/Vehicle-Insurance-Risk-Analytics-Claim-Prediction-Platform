[theme]
primaryColor = "#6366f1"
backgroundColor = "#0b0f19"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[client]
showSidebarNavigation = true
toolbarMode = "minimal"
